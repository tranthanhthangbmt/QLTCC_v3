<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHƯƠNG 2.3: CHU TRÌNH NGÂN SÁCH NHÀ NƯỚC</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --hover-color: #1d4ed8;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --hover-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
            position: relative;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.3;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #6b7280;
            font-weight: 600;
        }

        .back-btn {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: var(--card-bg);
            color: var(--primary-color);
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--hover-shadow);
            background-color: var(--primary-color);
            color: white;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
            min-height: 120px;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--hover-shadow);
            border-color: var(--primary-color);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary-color);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .part-number {
            background: var(--primary-color);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.3);
        }

        .part-info {
            flex-grow: 1;
        }

        .part-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #111827;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .part-desc {
            font-size: 0.9rem;
            color: #6b7280;
        }

        .arrow-icon {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            color: var(--primary-color);
        }

        .card:hover .arrow-icon {
            opacity: 1;
            transform: translateX(0);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            header {
                margin-top: 40px;
            }

            .grid-container {
                grid-template-columns: 1fr;
            }

            .back-btn {
                position: relative;
                display: inline-flex;
                margin-bottom: 20px;
                top: auto;
                left: auto;
            }
        }

        /* CARD WRAPPER & INFOGRAPHIC BTN */
        .card-wrapper {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }

        .infographic-btn {
            width: 60px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .infographic-btn:hover {
            transform: translateY(-4px);
            box-shadow: var(--hover-shadow);
            filter: brightness(1.1);
        }

        .card {
            flex-grow: 1;
        }

        /* INFOGRAPHIC MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal.active img {
            transform: scale(1);
        }

        .modal-close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            backdrop-filter: blur(4px);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .modal-close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <header>
        <a href="../index.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Quay lại Menu
        </a>
        <h1>CHU TRÌNH NGÂN SÁCH NHÀ NƯỚC</h1>
        <p class="subtitle">CHƯƠNG 2.3</p>
    </header>

    <div class="grid-container">
        <!-- Phần 1 -->
        <div class="card-wrapper">
            <button class="infographic-btn" onclick="openInfographic(1)" title="Xem Infographic">ℹ️</button>
            <a href="./Phần 1_2.3_T1_National_Budget_Planning_Blueprint/index.html" class="card">
                <div class="part-number">01</div>
                <div class="part-info">
                    <div class="part-title">Chuẩn bị và Lập Dự toán</div>
                    <div class="part-desc">National Budget Planning Blueprint</div>
                </div>
                <div class="arrow-icon">➜</div>
            </a>
        </div>

        <!-- Phần 2 -->
        <div class="card-wrapper">
            <button class="infographic-btn" onclick="openInfographic(2)" title="Xem Infographic">ℹ️</button>
            <a href="./Phần 2_2.3_T2_Budget_Execution_and_Finalization/index.html" class="card">
                <div class="part-number">02</div>
                <div class="part-info">
                    <div class="part-title">Chấp hành Ngân sách</div>
                    <div class="part-desc">Budget Execution and Finalization</div>
                </div>
                <div class="arrow-icon">➜</div>
            </a>
        </div>

        <!-- Phần 3 -->
        <div class="card-wrapper">
            <button class="infographic-btn" onclick="openInfographic(3)" title="Xem Infographic">ℹ️</button>
            <a href="./Phần 3_2.3_T3_State_Budget_Settlement/index.html" class="card">
                <div class="part-number">03</div>
                <div class="part-info">
                    <div class="part-title">Quyết toán Ngân sách</div>
                    <div class="part-desc">State Budget Settlement</div>
                </div>
                <div class="arrow-icon">➜</div>
            </a>
        </div>
    </div>

    <!-- Infographic Modal -->
    <div id="infographic-modal" class="modal">
        <button class="modal-close-btn" onclick="closeInfographic()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Menu
        </button>
        <img id="infographic-img" class="modal-content" src="" alt="Infographic">
    </div>

    <script>
        const modal = document.getElementById('infographic-modal');
        const modalImg = document.getElementById('infographic-img');

        function openInfographic(partNumber) {
            // Path: Infographic/Phần N_.png
            const src = `Infographic/Phần ${partNumber}_.png`;
            modalImg.src = src;
            modal.classList.add('active');
        }

        function closeInfographic() {
            modal.classList.remove('active');
            setTimeout(() => {
                modalImg.src = '';
            }, 300);
        }

        // Close when clicking outside image
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeInfographic();
            }
        });

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeInfographic();
            }
        });
    </script>
</body>

</html>
