<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tài Chính Công - Danh Sách Chương</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --hover-color: #1d4ed8;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --hover-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 800;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #6b7280;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            padding: 40px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--hover-shadow);
            border-color: var(--primary-color);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--primary-color);
            opacity: 0.8;
        }

        .chapter-badge {
            background: var(--primary-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .chapter-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            line-height: 1.4;
        }

        .arrow-icon {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-top: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .card:hover .arrow-icon {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>QUẢN LÝ TÀI CHÍNH CÔNG</h1>
        <p class="subtitle">Năm 2024</p>
    </header>

    <div class="grid-container">
        <!-- Chương 1 -->
        <a href="./Chương_1/index.html" class="card">
            <span class="chapter-badge">Chương 1</span>
            <div class="chapter-title">
                TỔNG QUAN VỀ TÀI CHÍNH CÔNG VÀ QUẢN LÝ TÀI CHÍNH CÔNG
            </div>
            <div class="arrow-icon">➜</div>
        </a>

        <!-- Chương 2 -->
        <a href="./Chương_2/index.html" class="card">
            <span class="chapter-badge">Chương 2</span>
            <div class="chapter-title">
                QUẢN LÝ NGÂN SÁCH NHÀ NƯỚC
            </div>
            <div class="arrow-icon">➜</div>
        </a>

        <!-- Chương 2.3 -->
        <a href="./Chương_2.3/index.html" class="card">
            <span class="chapter-badge">Chương 2.3</span>
            <div class="chapter-title">
                CHU TRÌNH NGÂN SÁCH NHÀ NƯỚC
            </div>
            <div class="arrow-icon">➜</div>
        </a>

        <!-- Chương 2.4 -->
        <a href="./Chương_2.4/index.html" class="card">
            <span class="chapter-badge">Chương 2.4</span>
            <div class="chapter-title">
                CÂN ĐỐI NGÂN SÁCH NHÀ NƯỚC
            </div>
            <div class="arrow-icon">➜</div>
        </a>
    </div>

</body>

</html>
